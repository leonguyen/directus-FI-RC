app = "your-unique-directus-app-name"
primary_region = "iad" # Change to your preferred Fly region (e.g., ams, sin, lax)

[build]
  image = "directus/directus:latest"

[env]
  PORT = "8055"
  DB_CLIENT = "sqlite3"
  DB_FILENAME = "/data/database.db"

[[mounts]]
  source = "directus_vol"
  destination = "/data"

[http_service]
  internal_port = 8055
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb" # Directus runs best with at least 512MB RAM
